<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artizen - Pasif Gelirli Sanat Pazaryeri</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-container {
            width: 100%;
            max-width: 1200px;
            background-color: #1e1e1e;
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        /* Logonun boyutu ve ortalanması */
        .site-logo {
            max-width: 130px;
            height: auto;
            margin-bottom: 15px;
            display: inline-block;
        }

        .header-container h1 {
            margin: 0;
            font-size: 2.6rem;
            letter-spacing: 3px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff, #a18cd1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-container p {
            margin: 5px 0 0 0;
            color: #d15a3c;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .viral-bar {
            margin-top: 15px;
            color: #00ffcc;
            font-weight: bold;
            font-size: 1rem;
        }

        .upload-container {
            width: 100%;
            max-width: 1200px;
            background-color: #1e1e1e;
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            box-sizing: border-box;
        }

        .upload-container h3 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        .btn-yayinla {
            background-color: #e91e63;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            margin-left: 10px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }

        .art-card {
            background-color: #1e1e1e;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }

        .art-image {
            width: 100%;
            height: auto;
            object-fit: cover;
            aspect-ratio: 3/4;
        }

        .card-footer {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            background-color: #181818;
        }

        .views {
            color: #aaaaaa;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .commission {
            color: #e91e63;
            font-weight: bold;
        }
    </style>
</head>
