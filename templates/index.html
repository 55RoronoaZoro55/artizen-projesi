<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artizen - Pasif Gelirli Sanat Pazaryeri</title>
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .header-container { width: 100%; max-width: 1200px; background-color: #1e1e1e; border-radius: 12px; padding: 40px 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); margin-bottom: 20px; }
        
        /* Logo boyutu büyütüldü */
        .site-logo { 
            max-width: 250px; 
            width: 100%; 
            height: auto; 
            margin-bottom: 20px; 
            display: block; 
            margin-left: auto; 
            margin-right: auto; 
        }

        h1 { margin: 0; font-size: 2.6rem; letter-spacing: 3px; font-weight: 700; background: linear-gradient(135deg, #ffffff, #a18cd1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { margin: 5px 0 0 0; color: #d15a3c; font-size: 1.2rem; font-weight: bold; text-transform: uppercase; }
        .viral-bar { margin-top: 15px; color: #00ffcc; font-weight: bold; }
        
        .upload-container { width: 100%; max-width: 1200px; background-color: #1e1e1e; border-radius: 12px; padding: 25px; text-align: center; margin-bottom: 30px; }
        .btn-yayinla { background-color: #e91e63; color: white; border: none; padding: 12px 25px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; width: 100%; max-width: 1200px; }
        .art-card { background-color: #1e1e1e; border-radius: 12px; overflow: hidden; }
        .art-image { width: 100%; aspect-ratio: 3/4; object-fit: cover; }
        .card-footer { padding: 15px; display: flex; justify-content: space-between; font-size: 0.9rem; background-color: #181818; }
    </style>
</head>
<body>

    <header class="header-container">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Artizen Logo" class="site-logo">
        <h1>ARTİZEN</h1>
        <p>Keşfet</p>
        <div class="viral-bar">🎯 Bu Haftanın Viral İzlenme Barajı: 1000 izlenme</div>
    </header>

    <section class="upload-container">
        <h3>🎨 Kendi Eserini Yükle</h3>
        <form>
            <input type="file" id="file-upload">
            <button type="button" class="btn-yayinla">Sitede Yayınla</button>
        </form>
    </section>

    <main class="gallery-grid">
        <div class="art-card">
            <img src="https://images.unsplash.com/photo-1579783900882-c0d3dad7b119?w=600" alt="Sanat Eseri" class="art-image">
            <div class="card-footer"><span>👁️ 4500 izlenme</span><span style="color:#e91e63">💰 %20 Komisyon</span></div>
        </div>
    </main>

</body>
</html>
