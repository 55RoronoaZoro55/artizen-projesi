<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artizen - Passive Income Art Marketplace</title>
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .header-container { width: 100%; max-width: 1200px; background-color: #1e1e1e; border-radius: 12px; padding: 40px 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); margin-bottom: 20px; position: relative; }

        /* Navigasyon - Güncellendi */
        .auth-nav { position: absolute; top: 20px; right: 20px; display: flex; gap: 15px; }
        .nav-btn { color: white; text-decoration: none; font-size: 0.9rem; padding: 8px 15px; border: 1px solid #444; border-radius: 20px; transition: 0.3s; }
        .nav-btn:hover { background: #333; }
        .signup-btn { background: #e91e63; border: none; }

        .site-logo { max-width: 250px; width: 100%; height: auto; margin-bottom: 20px; }
        h1 { margin: 0; font-size: 2.6rem; letter-spacing: 3px; font-weight: 700; color: #fff; }
        .viral-bar { margin-top: 15px; color: #00ffcc; font-weight: bold; }
        
        .upload-container { width: 100%; max-width: 1200px; background-color: #1e1e1e; border-radius: 12px; padding: 25px; text-align: center; margin-bottom: 30px; }
        .btn-yayinla { background-color: #e91e63; color: white; border: none; padding: 12px 25px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; width: 100%; max-width: 1200px; }
        .art-card { background-color: #1e1e1e; border-radius: 12px; overflow: hidden; }
        .art-image { width: 100%; aspect-ratio: 3/4; object-fit: cover; }
        .card-footer { padding: 15px; display: flex; justify-content: space-between; font-size: 0.9rem; background-color: #181818; }

        /* Çerez Banner Stili */
        #cookie-banner { position: fixed; bottom: 0; width: 100%; background: #2c3e50; padding: 15px; text-align: center; border-top: 2px solid #e91e63; z-index: 1000; }
    </style>
</head>
<body>

    <header class="header-container">
        <nav class="auth-nav">
            {% if 'user_id' in session %}
                <span style="margin-right: 15px;">Merhaba, {{ session['username'] }}</span>
                <a href="/logout" class="nav-btn">Çıkış Yap</a>
            {% else %}
                <a href="/signup" class="nav-btn signup-btn">Sign Up</a>
            {% endif %}
        </nav>
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Artizen Logo" class="site-logo">
        <h1>ARTİZEN</h1>
        <p>Explore</p>
        <div class="viral-bar">🎯 This Week's Viral Goal: 1000 views</div>
    </header>

    <section class="upload-container">
        <h3>🎨 Upload Your Artwork</h3>
        <button class="btn-yayinla">Publish</button>
    </section>

    <main class="gallery-grid">
        <div class="art-card">
            <img src="https://images.unsplash.com/photo-1579783900882-c0d3dad7b119?w=600" alt="Artwork" class="art-image">
            <div class="card-footer"><span>👁️ 4500 views</span><span style="color:#e91e63">💰 20% Commission</span></div>
        </div>
    </main>

    <div id="cookie-banner">
        Sitemiz deneyimini iyileştirmek için çerezleri kullanır. 
        <button onclick="acceptCookies()" style="background:#e91e63; border:none; color:white; padding:5px 15px; cursor:pointer; border-radius:5px;">Kabul Et</button>
    </div>

    <script>
        function acceptCookies() {
            document.getElementById('cookie-banner').style.display = 'none';
            localStorage.setItem('cookies_accepted', 'true');
        }
        if(localStorage.getItem('cookies_accepted') === 'true') {
            document.getElementById('cookie-banner').style.display = 'none';
        }
    </script>
</body>
</html>
