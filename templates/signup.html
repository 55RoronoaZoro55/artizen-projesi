<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Artizen</title>
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px 20px; }
        
        /* Navigasyon Stili (Ana sayfadaki ile uyumlu) */
        .auth-nav { position: absolute; top: 20px; right: 20px; display: flex; gap: 15px; }
        .nav-btn { color: white; text-decoration: none; font-size: 0.9rem; padding: 8px 15px; border: 1px solid #444; border-radius: 20px; transition: 0.3s; }
        .nav-btn:hover { background: #333; }

        .form-container { background: #1e1e1e; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 300px; }
        .form-group { margin-bottom: 15px; }
        input { width: 100%; padding: 12px; box-sizing: border-box; border: 1px solid #444; border-radius: 8px; background: #2a2a2a; color: white; }
        button { width: 100%; padding: 12px; background-color: #e91e63; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background-color: #c2185b; }
        .checkbox-group { font-size: 12px; margin-bottom: 10px; color: #aaa; }
        a { color: #e91e63; }
    </style>
</head>
<body>

    <nav class="auth-nav">
        {% if 'user_id' in session %}
            <span>Merhaba, {{ session['username'] }}</span> | <a href="/logout" class="nav-btn">Çıkış Yap</a>
        {% else %}
            <a href="/" class="nav-btn">Ana Sayfa</a>
        {% endif %}
    </nav>

    <div class="form-container">
        <h2>Create an Account</h2>
        <form action="/signup" method="POST">
            <div class="form-group"><input type="text" name="username" placeholder="Username" required></div>
            <div class="form-group"><input type="email" name="email" placeholder="Email" required></div>
            <div class="form-group"><input type="password" id="password" name="password" placeholder="Password (min 8 chars)" required minlength="8"></div>
            <div class="form-group"><input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm Password" required></div>

            <div class="checkbox-group">
                <input type="checkbox" name="terms" id="terms" required>
                <label for="terms">I agree to the <a href="/terms" target="_blank">Terms of Service</a></label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" name="privacy" id="privacy" required>
                <label for="privacy">I agree to the <a href="/privacy" target="_blank">Privacy Policy</a></label>
            </div>

            <button type="submit">Sign Up</button>
        </form>
    </div>

    <script>
        const password = document.getElementById("password");
        const confirm_password = document.getElementById("confirm_password");

        function validatePassword(){
            if(password.value != confirm_password.value) {
                confirm_password.setCustomValidity("Passwords do not match!");
            } else {
                confirm_password.setCustomValidity('');
            }
        }
        password.onchange = validatePassword;
        confirm_password.onkeyup = validatePassword;
    </script>
</body>
</html>
