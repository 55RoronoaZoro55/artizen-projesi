<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Kayıt Ol - Artizen</title>
</head>
<body>

    <h2>Hesap Oluştur</h2>

    <form action="/signup" method="POST">
        <input type="text" name="username" placeholder="Kullanıcı Adı" required>
        <br><br>

        <input type="email" name="email" placeholder="E-posta" required>
        <br><br>

        <input type="password" id="password" name="password" placeholder="Şifre" required>
        <br><br>

        <input type="password" id="confirm_password" name="confirm_password" placeholder="Şifre Tekrar" required oninput="check(this)">
        <br><br>

        <input type="checkbox" name="terms" id="terms" required>
        <label for="terms">
            <a href="/terms" target="_blank">Hizmet Şartlarını</a> ve 
            <a href="/privacy" target="_blank">Gizlilik Politikasını</a> okudum ve kabul ediyorum.
        </label>
        <br><br>

        <button type="submit">Kayıt Ol</button>
    </form>

    <script>
        // Şifreler eşleşiyor mu kontrolü
        function check(input) {
            if (input.value != document.getElementById('password').value) {
                input.setCustomValidity('Şifreler eşleşmiyor!');
            } else {
                input.setCustomValidity('');
            }
        }
    </script>

</body>
</html>
